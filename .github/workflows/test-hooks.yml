name: Test All Hooks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test-go-hooks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hooks/debug-bundle
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Test debug-bundle
        run: |
          go test ./...
      - name: Test security-scan-gate
        run: |
          cd ../security-scan-gate
          go test ./...

  test-python-hooks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hook: [maintenance-gate, slack-notifier, teams-notifier]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Test ${{ matrix.hook }}
        run: |
          cd hooks/${{ matrix.hook }}
          python3 -m unittest discover .
