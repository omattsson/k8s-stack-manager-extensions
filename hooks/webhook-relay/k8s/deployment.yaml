apiVersion: v1
kind: Namespace
metadata:
  name: extensions
---
apiVersion: v1
kind: Secret
metadata:
  name: webhook-relay
  namespace: extensions
type: Opaque
stringData:
  RELAY_WEBHOOK_SECRET: "REPLACE_ME"
  RELAY_DESTINATIONS: |
    [
      {
        "name": "monitoring",
        "url": "https://monitoring.example/webhook",
        "events": ["deploy-finalized"],
        "headers": {"X-Source": "stack-manager"}
      },
      {
        "name": "cmdb",
        "url": "https://cmdb.example/api/hooks",
        "events": ["post-instance-create", "post-instance-delete"],
        "headers": {"Authorization": "Bearer REPLACE_ME"}
      }
    ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-relay
  namespace: extensions
  labels:
    app: webhook-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-relay
  template:
    metadata:
      labels:
        app: webhook-relay
    spec:
      containers:
        - name: webhook-relay
          image: webhook-relay:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: webhook-relay
          volumeMounts:
            - name: log-vol
              mountPath: /var/log/webhook-relay
          env:
            - name: RELAY_LOG_FILE
              value: /var/log/webhook-relay/deliveries.jsonl
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      volumes:
        - name: log-vol
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-relay
  namespace: extensions
spec:
  selector:
    app: webhook-relay
  ports:
    - port: 8080
      targetPort: 8080
