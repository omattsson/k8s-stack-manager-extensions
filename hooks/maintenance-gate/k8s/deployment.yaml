apiVersion: v1
kind: Namespace
metadata:
  name: extensions
---
apiVersion: v1
kind: Secret
metadata:
  name: maintenance-gate
  namespace: extensions
type: Opaque
stringData:
  GATE_WEBHOOK_SECRET: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-gate
  namespace: extensions
  labels:
    app: maintenance-gate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintenance-gate
  template:
    metadata:
      labels:
        app: maintenance-gate
    spec:
      containers:
        - name: maintenance-gate
          image: maintenance-gate:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: maintenance-gate
          env:
            - name: TIMEZONE
              value: "Europe/Stockholm"
            - name: ALLOWED_DAYS
              value: "mon,tue,wed,thu,fri"
            - name: ALLOWED_START_HOUR
              value: "8"
            - name: ALLOWED_END_HOUR
              value: "17"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-gate
  namespace: extensions
spec:
  selector:
    app: maintenance-gate
  ports:
    - port: 8080
      targetPort: 8080
