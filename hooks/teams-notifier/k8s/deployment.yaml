apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-notifier
  namespace: extensions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-notifier
  template:
    metadata:
      labels:
        app: teams-notifier
    spec:
      containers:
        - name: teams-notifier
          image: teams-notifier:latest
          ports:
            - containerPort: 8080
          env:
            - name: TEAMS_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: teams-notifier-secret
                  key: TEAMS_WEBHOOK_URL
            - name: GATE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: teams-notifier-secret
                  key: GATE_WEBHOOK_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
